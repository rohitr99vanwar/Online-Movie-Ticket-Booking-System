<!DOCTYPE html>
<html>
<head>
    <title>Booking History</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="navbar">
    <h2>🎬 Booking History</h2>
    <a href="/home">Back</a>
</div>

<div class="container">

<table border="1" style="margin:auto; color:white;">
<tr>
    <th>Movie</th>
    <th>Seat</th>
    <th>Timing</th>
</tr>

{% for b in bookings %}
<tr>
    <td>{{ b[0] }}</td>
    <td>{{ b[1] }}</td>
    <td>{{ b[2] }}</td>
</tr>
{% endfor %}

</table>

</div>

</body>
</html>
